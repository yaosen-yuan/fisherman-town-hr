<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漁人町 HR — 管理後台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar:#1c1412;--sidebar-hover:#2a1e1b;--sidebar-active:#3a2520;
  --accent:#d4292e;--accent-hover:#b91c21;--accent-light:#fff1f1;
  --success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --bg:#f7f4f2;--card:#fff;--border:#e8e2de;--text:#1a1614;--muted:#6b6560;
}
body{font-family:'Helvetica Neue','PingFang TC',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:216px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo-area{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo-area img{height:36px;width:auto;filter:brightness(0) invert(1);display:block}
.logo-sub{color:rgba(255,255,255,.3);font-size:10.5px;margin-top:6px;letter-spacing:.3px}
.co-switch{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.co-label{font-size:10px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.co-tabs{display:flex;flex-wrap:wrap;gap:4px}
.co-tab{padding:5px 8px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.09);transition:all .15s;background:transparent}
.co-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.co-tab:not(.active):hover{background:var(--sidebar-hover);color:rgba(255,255,255,.8)}
.nav{flex:1;padding:8px 0}
.nav-section{padding:10px 18px 4px;font-size:10px;color:rgba(255,255,255,.22);text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;color:rgba(255,255,255,.48);transition:all .15s;font-size:13px}
.nav-item:hover{background:var(--sidebar-hover);color:rgba(255,255,255,.85)}
.nav-item.active{background:var(--sidebar-active);color:#fff;border-right:2px solid var(--accent)}
.nav-item .ico{font-size:15px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px}
.user-area{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;cursor:pointer}
.user-area:hover{background:var(--sidebar-hover)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
.user-name{color:#fff;font-size:12.5px;font-weight:500}
.user-role{color:rgba(255,255,255,.38);font-size:10.5px}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:17px;font-weight:700}
.page-subtitle{font-size:12px;color:var(--muted);margin-top:2px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{padding:8px 16px;border-radius:8px;font-size:12.5px;cursor:pointer;border:none;font-weight:600;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.stat-label{font-size:11.5px;color:var(--muted);margin-bottom:8px}
.stat-value{font-size:26px;font-weight:800;color:var(--text);line-height:1}
.stat-sub{font-size:11.5px;margin-top:6px;color:var(--muted)}
.stat-up{color:var(--success)}
.stat-warn{color:var(--warn)}
/* TAGS */
.tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:600}
.tag-漁人町{background:#fee2e2;color:#991b1b}
.tag-白鯨科技{background:#ede9fe;color:#6d28d9}
.tag-酷樂邦{background:#d1fae5;color:#065f46}
.tag-魚樂邦{background:#fef3c7;color:#92400e}
/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:700}
/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* TABS */
.tabs{display:flex;gap:2px;padding:3px;background:var(--bg);border-radius:8px}
.tab{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s;font-weight:500}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* SCHEDULE */
.sched-wrap{overflow-x:auto}
.sched-table{width:100%;border-collapse:collapse;font-size:12px}
.sched-table th{background:var(--bg);padding:8px 10px;text-align:center;font-weight:600;color:var(--muted);font-size:11px;border-bottom:1px solid var(--border)}
.sched-table th:first-child{text-align:left;padding-left:18px}
.sched-table td{padding:8px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.sched-table tr:last-child td{border-bottom:none}
.sched-table td:first-child{text-align:left;padding-left:18px}
.emp-cell{display:flex;align-items:center;gap:6px;white-space:nowrap}
.shift{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .15s}
.shift-full{background:#d1fae5;color:#065f46}
.shift-am{background:#dbeafe;color:#1d4ed8}
.shift-pm{background:#fce7f3;color:#be185d}
.shift-off{background:#f1f5f9;color:#94a3b8}
.shift-holiday{background:#fef3c7;color:#92400e}
/* LEAVE TABLE */
.leave-table{width:100%;border-collapse:collapse;font-size:12.5px}
.leave-table th{background:var(--bg);padding:9px 14px;text-align:left;font-weight:600;color:var(--muted);font-size:11px;border-bottom:1px solid var(--border)}
.leave-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.leave-table tr:last-child td{border-bottom:none}
.leave-table tr:hover td{background:#fdf9f8}
.status-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.s-pending{background:#fef3c7;color:#92400e}
.s-approved{background:#d1fae5;color:#065f46}
.s-rejected{background:#fee2e2;color:#991b1b}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-pending{background:var(--warn)}
.dot-approved{background:var(--success)}
.action-btn{padding:4px 10px;border-radius:6px;font-size:11px;border:none;cursor:pointer;font-weight:600;transition:.15s;font-family:inherit}
.approve-btn{background:#d1fae5;color:#065f46}
.approve-btn:hover{background:#a7f3d0}
.reject-btn{background:#fee2e2;color:#991b1b;margin-left:4px}
.reject-btn:hover{background:#fecaca}
/* PAYROLL */
.pay-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border)}
.pay-row:last-child{border-bottom:none}
.pay-row:hover{background:#fdf9f8}
.pay-name{font-weight:600;font-size:13px}
.pay-detail{font-size:11px;color:var(--muted);margin-top:2px}
.pay-amt{font-weight:800;font-size:15px;text-align:right}
.pay-sub{font-size:11px;color:var(--muted);text-align:right;margin-top:2px}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:10px}
/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;padding:28px;width:460px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text)}
.form-row input,.form-row select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:#faf8f7;color:var(--text);outline:none;transition:.15s}
.form-row input:focus,.form-row select:focus{border-color:var(--accent);background:#fff}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:14px}
.spinner{width:34px;height:34px;border:3px solid rgba(212,41,46,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;z-index:300;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:none}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}
</style>
</head>

<script>
const URL_SB='https://lgxvfpgxpigmsgfugegl.supabase.co';
const KEY_SB='sb_publishable_tm1h43HAkhQxjuoc-M3rQw_1kWI3b5Y';
const {createClient}=supabase;
const db=createClient(URL_SB,KEY_SB);
let currentUser=null,currentEmployee=null,companies=[],employees=[],selectedCompanyId='all',currentPage='dashboard';

async function init(){
  const{data:{session}}=await db.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  currentUser=session.user;
  const{data:emp}=await db.from('employees').select('*').eq('user_id',currentUser.id).single();
  if(!emp||emp.role!=='admin'){window.location.href='employee.html';return;}
  currentEmployee=emp;
  document.getElementById('userName').textContent=emp.name||emp.email;
  document.getElementById('userAvatar').textContent=(emp.name||emp.email)[0].toUpperCase();
  const{data:cos}=await db.from('companies').select('*').order('name');
  companies=cos||[];
  renderCoTabs();
  await loadEmployees();
  await countPending();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  showPage('dashboard');
}

function renderCoTabs(){
  const c=document.getElementById('coTabs');
  c.innerHTML=`<div class="co-tab active" onclick="selectCompany('all')" id="co-all">全部</div>`+
    companies.map(x=>`<div class="co-tab" onclick="selectCompany('${x.id}')" id="co-${x.id}">${x.short_name}</div>`).join('');
}

function selectCompany(id){
  selectedCompanyId=id;
  document.querySelectorAll('.co-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('co-'+id)?.classList.add('active');
  showPage(currentPage);
}

async function loadEmployees(){
  const{data}=await db.from('employees').select('*,companies(short_name)').eq('is_active',true).order('name');
  employees=data||[];
}

async function countPending(){
  const{count}=await db.from('leave_requests').select('*',{count:'exact',head:true}).eq('status','pending');
  const b=document.getElementById('pendingBadge');
  if(count>0){b.textContent=count;b.style.display='inline';}else b.style.display='none';
}

function showPage(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+page)?.classList.add('active');
  const titles={dashboard:'總覽儀表板',schedule:'排班管理',leaves:'假別審核',payroll:'薪資管理',employees:'員工列表'};
  document.getElementById('pageTitle').textContent=titles[page]||'';
  const now=new Date();const y=now.getFullYear()-1911;const m=now.getMonth()+1;
  const co=selectedCompanyId==='all'?'全部公司':(companies.find(c=>c.id===selectedCompanyId)?.short_name||'');
  document.getElementById('pageSubtitle').textContent=`${y}年${m}月 · ${co}`;
  const a=document.getElementById('topbarActions');a.innerHTML='';
  if(page==='schedule'){a.innerHTML='<button class="btn btn-primary" onclick="openModal(\'schedModal\')">+ 新增排班</button>';renderSchedule();}
  else if(page==='leaves')renderLeaves();
  else if(page==='payroll')renderPayroll();
  else if(page==='employees'){a.innerHTML='<button class="btn btn-primary" onclick="openModal(\'empModal\')">+ 新增員工</button>';renderEmployees();}
  else renderDashboard();
}

function filter(list){return selectedCompanyId==='all'?list:list.filter(e=>e.company_id===selectedCompanyId);}

async function renderDashboard(){
  const el=document.getElementById('contentArea');
  el.innerHTML='<div class="empty"><div class="spinner" style="margin:auto"></div></div>';
  const emps=filter(employees);
  const{data:leaves}=await db.from('leave_requests').select('*,employees(name,company_id,companies(short_name))').eq('status','pending').order('created_at',{ascending:false});
  const pending=(leaves||[]).filter(l=>selectedCompanyId==='all'||l.employees?.company_id===selectedCompanyId);
  el.innerHTML=`
    <div class="stats">
      <div class="stat-card"><div class="stat-label">在職員工</div><div class="stat-value">${emps.length}</div>
        <div class="stat-sub">${companies.map(c=>`${c.short_name} ${employees.filter(e=>e.company_id===c.id).length}人`).join(' · ')}</div></div>
      <div class="stat-card"><div class="stat-label">待審假別</div><div class="stat-value" style="color:var(--warn)">${pending.length}</div>
        <div class="stat-sub stat-warn">${pending.length>0?'需要處理':'無待處理'}</div></div>
      <div class="stat-card"><div class="stat-label">公司數</div><div class="stat-value">${companies.length}</div>
        <div class="stat-sub" style="color:var(--muted)">集團管理模式</div></div>
      <div class="stat-card"><div class="stat-label">系統狀態</div><div class="stat-value" style="color:var(--success)">正常</div>
        <div class="stat-sub stat-up">Supabase 連線中</div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-header"><span class="card-title">待審假別申請</span>
          <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="showPage('leaves')">查看全部</button></div>
        ${renderLeaveRows(pending.slice(0,5),true)}
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">員工列表</span></div>
        <div>
          ${emps.slice(0,6).map(e=>`
            <div style="display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border)">
              <div style="width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0">${e.name[0]}</div>
              <div style="flex:1"><div style="font-weight:600;font-size:13px">${e.name}</div><div style="font-size:11px;color:var(--muted)">${e.email}</div></div>
              <span class="tag tag-${e.companies?.short_name}">${e.companies?.short_name||''}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

async function renderSchedule(){
  const el=document.getElementById('contentArea');
  el.innerHTML='<div class="empty"><div class="spinner" style="margin:auto"></div></div>';
  const today=new Date();const day=today.getDay()||7;
  const monday=new Date(today);monday.setDate(today.getDate()-day+1);
  const wk=Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;});
  const emps=filter(employees);
  const s0=wk[0].toISOString().split('T')[0],s6=wk[6].toISOString().split('T')[0];
  let q=db.from('schedules').select('*').gte('work_date',s0).lte('work_date',s6);
  if(selectedCompanyId!=='all')q=q.eq('company_id',selectedCompanyId);
  const{data:sc}=await q;
  const sm={};(sc||[]).forEach(s=>{sm[`${s.employee_id}_${s.work_date}`]=s;});
  const dn=['週一','週二','週三','週四','週五','週六','週日'];
  const sl={full:'全天',am:'早班',pm:'晚班',off:'休',holiday:'國定'};
  const cls={full:'shift-full',am:'shift-am',pm:'shift-pm',off:'shift-off',holiday:'shift-holiday'};
  el.innerHTML=`
    <div class="card">
      <div class="card-header">
        <span class="card-title">本週排班（${wk[0].getMonth()+1}/${wk[0].getDate()} – ${wk[6].getMonth()+1}/${wk[6].getDate()}）</span>
      </div>
      <div class="sched-wrap">
        <table class="sched-table">
          <thead><tr><th>員工</th>${wk.map((d,i)=>`<th>${dn[i]}<br><span style="font-weight:400;color:var(--muted)">${d.getMonth()+1}/${d.getDate()}</span></th>`).join('')}</tr></thead>
          <tbody>
            ${emps.length===0?`<tr><td colspan="8"><div class="empty"><div class="empty-icon">👥</div>目前沒有員工資料</div></td></tr>`:
            emps.map(emp=>`<tr>
              <td><div class="emp-cell"><span class="tag tag-${emp.companies?.short_name}">${emp.companies?.short_name}</span><strong>${emp.name}</strong></div></td>
              ${wk.map(d=>{
                const ds=d.toISOString().split('T')[0];
                const s=sm[`${emp.id}_${ds}`];
                const sw=d.getDay()===0||d.getDay()===6;
                if(s)return`<td><span class="shift ${cls[s.shift_type]||'shift-off'}">${sl[s.shift_type]||s.shift_type}</span></td>`;
                if(sw)return`<td style="background:#fdf9f8"><span style="color:#d1c9c5;font-size:11px">—</span></td>`;
                return`<td><span style="color:#d1c9c5;font-size:11px">未排</span></td>`;
              }).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  const sel=document.getElementById('schedEmp');
  if(sel)sel.innerHTML=emps.map(e=>`<option value="${e.id}">${e.name}（${e.companies?.short_name}）</option>`).join('');
}

async function renderLeaves(){
  const el=document.getElementById('contentArea');
  el.innerHTML='<div class="empty"><div class="spinner" style="margin:auto"></div></div>';
  const{data:leaves}=await db.from('leave_requests').select('*,employees(name,company_id,companies(short_name))').order('created_at',{ascending:false});
  const f=(leaves||[]).filter(l=>selectedCompanyId==='all'||l.employees?.company_id===selectedCompanyId);
  el.innerHTML=`
    <div class="card">
      <div class="card-header"><span class="card-title">假別申請列表</span>
        <span style="font-size:12px;color:var(--warn);font-weight:600">${f.filter(l=>l.status==='pending').length} 筆待處理</span></div>
      ${renderLeaveRows(f,false)}
    </div>`;
}

function renderLeaveRows(leaves,compact){
  if(!leaves||leaves.length===0)return'<div class="empty"><div class="empty-icon">🗓</div>目前沒有假別申請</div>';
  const sm={pending:['s-pending','dot-pending','待審核'],approved:['s-approved','dot-approved','已核准'],rejected:['s-rejected','dot-pending','已拒絕']};
  return`<table class="leave-table"><thead><tr><th>員工</th><th>假別</th><th>日期</th><th>天數</th>${!compact?'<th>原因</th>':''}<th>狀態</th><th>操作</th></tr></thead><tbody>
    ${leaves.map(l=>{
      const[cls,dc,label]=sm[l.status]||sm.pending;
      const sn=l.employees?.companies?.short_name||'';
      return`<tr><td><div style="display:flex;align-items:center;gap:6px"><span class="tag tag-${sn}">${sn}</span><strong>${l.employees?.name||'—'}</strong></div></td>
        <td>${l.leave_type}</td>
        <td style="white-space:nowrap">${l.start_date}${l.start_date!==l.end_date?' ~ '+l.end_date:''}</td>
        <td>${l.days}天</td>
        ${!compact?`<td style="color:var(--muted)">${l.reason||'—'}</td>`:''}
        <td><span class="status-pill ${cls}"><span class="dot ${dc}"></span>${label}</span></td>
        <td>${l.status==='pending'?`<button class="action-btn approve-btn" onclick="reviewLeave('${l.id}','approved')">核准</button><button class="action-btn reject-btn" onclick="reviewLeave('${l.id}','rejected')">拒絕</button>`:'<span style="color:var(--muted);font-size:11px">已處理</span>'}</td>
      </tr>`;}).join('')}
  </tbody></table>`;
}

async function reviewLeave(id,status){
  await db.from('leave_requests').update({status,reviewed_by:currentEmployee.id,reviewed_at:new Date().toISOString()}).eq('id',id);
  showToast(status==='approved'?'已核准假別申請':'已拒絕假別申請',status==='approved'?'success':'error');
  await countPending();renderLeaves();
}

async function renderPayroll(){
  const el=document.getElementById('contentArea');
  const emps=filter(employees);const now=new Date();
  el.innerHTML=`
    <div class="card">
      <div class="card-header"><span class="card-title">薪資預覽 — ${now.getFullYear()-1911}年${now.getMonth()+1}月</span>
        <button class="btn btn-primary" style="font-size:12px" onclick="showToast('薪資計算功能開發中','success')">計算薪資</button></div>
      <div>
        ${emps.length===0?'<div class="empty"><div class="empty-icon">💰</div>請先新增員工</div>':
        emps.map(e=>`<div class="pay-row">
          <div><div class="pay-name">${e.name} <span class="tag tag-${e.companies?.short_name}" style="font-size:9px">${e.companies?.short_name}</span></div>
          <div class="pay-detail">月薪制 · 待串接出勤資料</div></div>
          <div><div class="pay-amt" style="color:var(--muted)">${e.monthly_salary?'NT$ '+Number(e.monthly_salary).toLocaleString():'未設定月薪'}</div>
          <div class="pay-sub">填入月薪後自動計算</div></div>
        </div>`).join('')}
      </div>
    </div>`;
}

async function renderEmployees(){
  const el=document.getElementById('contentArea');
  const emps=filter(employees);
  const sel=document.getElementById('empCompany');
  if(sel)sel.innerHTML=companies.map(c=>`<option value="${c.id}">${c.short_name}</option>`).join('');
  el.innerHTML=`
    <div class="card">
      <div class="card-header"><span class="card-title">員工列表（${emps.length} 人）</span></div>
      <table class="leave-table">
        <thead><tr><th>姓名</th><th>公司</th><th>Email</th><th>月薪</th><th>到職日</th><th>角色</th><th>操作</th></tr></thead>
        <tbody>
          ${emps.length===0?`<tr><td colspan="7"><div class="empty"><div class="empty-icon">👥</div>請新增員工</div></td></tr>`:
          emps.map(e=>`<tr>
            <td><strong>${e.name}</strong></td>
            <td><span class="tag tag-${e.companies?.short_name}">${e.companies?.short_name||'—'}</span></td>
            <td style="color:var(--muted)">${e.email}</td>
            <td>${e.monthly_salary?'NT$ '+Number(e.monthly_salary).toLocaleString():'—'}</td>
            <td>${e.hire_date||'—'}</td>
            <td><span class="status-pill ${e.role==='admin'?'s-pending':'s-approved'}">${e.role==='admin'?'管理者':'員工'}</span></td>
            <td><button class="action-btn reject-btn" onclick="deactivateEmp('${e.id}')">停用</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

async function deactivateEmp(id){
  if(!confirm('確定要停用此員工帳號？'))return;
  await db.from('employees').update({is_active:false}).eq('id',id);
  await loadEmployees();renderEmployees();showToast('員工帳號已停用');
}

async function saveSchedule(){
  const empId=document.getElementById('schedEmp').value;
  const date=document.getElementById('schedDate').value;
  const shift=document.getElementById('schedShift').value;
  const hours=parseFloat(document.getElementById('schedHours').value);
  const note=document.getElementById('schedNote').value;
  if(!empId||!date){showToast('請填寫員工與日期','error');return;}
  const emp=employees.find(e=>e.id===empId);
  await db.from('schedules').upsert({employee_id:empId,company_id:emp.company_id,work_date:date,shift_type:shift,hours,note},{onConflict:'employee_id,work_date'});
  closeModal('schedModal');showToast('排班已儲存');renderSchedule();
}

async function saveEmployee(){
  const name=document.getElementById('empName').value.trim();
  const email=document.getElementById('empEmail').value.trim();
  const password=document.getElementById('empPassword').value;
  const companyId=document.getElementById('empCompany').value;
  const salary=document.getElementById('empSalary').value;
  const hireDate=document.getElementById('empHire').value;
  const role=document.getElementById('empRole').value;
  if(!name||!email||!password){showToast('請填寫必要欄位','error');return;}

  // 檢查 email 是否已在員工列表
  const{data:existing}=await db.from('employees').select('id').eq('email',email).single();
  if(existing){showToast('此 Email 已有員工帳號，請換一個','error');return;}

  // Step 1：先建立員工資料（不含 user_id）
  const{data:empData,error:empErr}=await db.from('employees').insert({
    name,email,company_id:companyId,
    monthly_salary:salary||null,
    hire_date:hireDate||null,
    role,is_active:true
  }).select().single();
  if(empErr){showToast('建立員工資料失敗：'+empErr.message,'error');return;}

  // Step 2：建立 Auth 登入帳號
  const{data:authData,error:authErr}=await db.auth.signUp({email,password});

  if(authErr){
    // Auth 建立失敗也沒關係，員工資料已存在，之後可補
    showToast(`${name} 資料已建立，但登入帳號設定失敗，請在 Supabase Auth 手動建立`,'error');
    closeModal('empModal');
    await loadEmployees();renderEmployees();
    return;
  }

  // Step 3：更新 user_id
  const userId=authData.user?.id;
  if(userId){
    await db.from('employees').update({user_id:userId}).eq('id',empData.id);
  }

  closeModal('empModal');
  showToast(`${name} 的帳號已建立 ✅`);
  await loadEmployees();renderEmployees();
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});});
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast toast-${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}
async function handleLogout(){if(!confirm('確定要登出？'))return;await db.auth.signOut();window.location.href='index.html';}
init();
</script>
