<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漁人町 HR — 登入</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#d4292e;--accent-hover:#b91c21;
  --bg:#f7f4f2;--card:#fff;--text:#1a1614;--muted:#6b6560;--border:#e8e2de;--error:#ef4444;
}
body{font-family:'Helvetica Neue','PingFang TC',Arial,sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.bg-pattern{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 15% 15%,rgba(212,41,46,.07) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 85% 85%,rgba(212,41,46,.05) 0%,transparent 60%)}
.wrap{position:relative;z-index:1;width:100%;max-width:420px}
.brand{text-align:center;margin-bottom:28px}
.brand img{height:68px;width:auto;display:block;margin:0 auto 12px}
.brand-sub{font-size:12.5px;color:var(--muted);margin-top:4px}
.brand-cos{font-size:11px;color:var(--muted);margin-top:6px;opacity:.75}
.card{background:var(--card);border-radius:20px;padding:36px 36px 32px;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04)}
.card-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:5px}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:26px}
.form-group{margin-bottom:17px}
label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:7px}
input[type="email"],input[type="password"]{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:#faf8f7;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(212,41,46,.1);background:#fff}
.btn-login{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s;font-family:inherit;margin-top:8px;letter-spacing:.3px}
.btn-login:hover{background:var(--accent-hover)}
.btn-login:active{transform:scale(.99)}
.btn-login:disabled{opacity:.65;cursor:not-allowed;transform:none}
.error-msg{background:#fef2f2;border:1px solid #fecaca;color:var(--error);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.error-msg.show{display:block}
.spinner-sm{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
hr{border:none;border-top:1px solid var(--border);margin:22px 0 18px}
.roles{display:flex;gap:10px}
.role{flex:1;padding:10px 12px;background:#faf8f7;border:1px solid var(--border);border-radius:8px;font-size:11.5px;text-align:center}
.role strong{display:block;font-size:12px;color:var(--accent);margin-bottom:3px}
.role span{color:var(--muted)}
.footer{text-align:center;margin-top:18px;font-size:11.5px;color:var(--muted)}
</style>
</head>

<script>
const URL_SB='https://lgxvfpgxpigmsgfugegl.supabase.co';
const KEY_SB='sb_publishable_tm1h43HAkhQxjuoc-M3rQw_1kWI3b5Y';
const {createClient}=supabase;
const db=createClient(URL_SB,KEY_SB);
(async()=>{const{data:{session}}=await db.auth.getSession();if(session)await go(session.user.id);})();
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pwd=document.getElementById('pwd').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('err');
  err.classList.remove('show');
  if(!email||!pwd){err.textContent='請填寫 Email 與密碼';err.classList.add('show');return;}
  btn.disabled=true;btn.innerHTML='<span class="spinner-sm"></span>登入中...';
  try{
    const{data,error}=await db.auth.signInWithPassword({email,password:pwd});
    if(error){err.textContent='Email 或密碼錯誤，請再試一次';err.classList.add('show');return;}
    await go(data.user.id);
  }catch(e){err.textContent='登入失敗，請稍後再試';err.classList.add('show');}
  finally{btn.disabled=false;btn.innerHTML='登入';}
}
async function go(uid){
  const{data:e}=await db.from('employees').select('role').eq('user_id',uid).single();
  window.location.href=e?.role==='admin'?'dashboard.html':'employee.html';
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
