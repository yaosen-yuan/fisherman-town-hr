<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漁人町 HR — 員工工作台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#d4292e;--accent-hover:#b91c21;
  --bg:#f7f4f2;--card:#fff;--text:#1a1614;--muted:#6b6560;--border:#e8e2de;
  --success:#10b981;--warn:#f59e0b;--danger:#ef4444;
}
body{font-family:'Helvetica Neue','PingFang TC',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
/* TOPBAR */
.topbar{background:var(--accent);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(212,41,46,.3)}
.top-logo img{height:28px;width:auto;filter:brightness(0) invert(1);display:block}
.top-user{display:flex;align-items:center;gap:10px}
.top-name{color:rgba(255,255,255,.95);font-size:13px;font-weight:500}
.top-company{color:rgba(255,255,255,.6);font-size:11px}
.top-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.logout-btn{padding:6px 12px;border:1px solid rgba(255,255,255,.3);border-radius:7px;color:rgba(255,255,255,.85);background:transparent;cursor:pointer;font-size:12px;font-family:inherit;transition:.15s}
.logout-btn:hover{background:rgba(255,255,255,.15)}
/* NAV TABS */
.nav-tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex}
.nav-tab{padding:14px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-tab:hover:not(.active){color:var(--text)}
/* CONTENT */
.content{max-width:860px;margin:0 auto;padding:24px 20px;display:flex;flex-direction:column;gap:16px}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:700}
/* WELCOME */
.welcome-card{background:var(--accent);border-radius:16px;padding:24px 28px;color:#fff;position:relative;overflow:hidden}
.welcome-card::after{content:'漁人町';position:absolute;right:-10px;top:-10px;font-size:80px;font-weight:900;opacity:.08;letter-spacing:-2px;pointer-events:none}
.welcome-greeting{font-size:20px;font-weight:700;margin-bottom:4px}
.welcome-sub{font-size:13px;opacity:.8}
.welcome-stats{display:flex;gap:12px;margin-top:18px}
.welcome-stat{background:rgba(255,255,255,.15);border-radius:10px;padding:12px 16px;flex:1;text-align:center}
.welcome-stat-val{font-size:22px;font-weight:800}
.welcome-stat-label{font-size:11px;opacity:.75;margin-top:3px}
/* SCHEDULE GRID */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:16px 18px}
.day-cell{border-radius:10px;padding:10px 6px;text-align:center;border:1px solid var(--border);background:#fdf9f8}
.day-cell.today{border-color:var(--accent);background:#fff1f1}
.day-cell.weekend{opacity:.6}
.day-name{font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
.day-date{font-size:11px;color:var(--muted);margin-bottom:8px}
.day-shift{font-size:11px;font-weight:600;padding:3px 6px;border-radius:5px}
.shift-full{background:#d1fae5;color:#065f46}
.shift-am{background:#dbeafe;color:#1d4ed8}
.shift-pm{background:#fce7f3;color:#be185d}
.shift-off{background:#f1f5f9;color:#94a3b8}
.shift-holiday{background:#fef3c7;color:#92400e}
.shift-none{color:#d1c9c5;font-size:10px}
/* FORM */
.leave-form{padding:18px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:#faf8f7;color:var(--text);outline:none;transition:.15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent);background:#fff}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{padding:10px 20px;border-radius:8px;font-size:13px;cursor:pointer;border:none;font-weight:600;transition:.15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
/* TABLES */
.leave-table{width:100%;border-collapse:collapse;font-size:12.5px}
.leave-table th{background:var(--bg);padding:9px 14px;text-align:left;font-weight:600;color:var(--muted);font-size:11px;border-bottom:1px solid var(--border)}
.leave-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.leave-table tr:last-child td{border-bottom:none}
.leave-table tr:hover td{background:#fdf9f8}
.status-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.s-pending{background:#fef3c7;color:#92400e}
.s-approved{background:#d1fae5;color:#065f46}
.s-rejected{background:#fee2e2;color:#991b1b}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot-pending{background:var(--warn)}
.dot-approved{background:var(--success)}
/* PAYROLL */
.pay-line{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.pay-line:last-child{border-bottom:none;font-weight:700;font-size:15px}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:10px}
/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:14px}
.spinner{width:32px;height:32px;border:3px solid rgba(212,41,46,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;z-index:300;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:none}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}
</style>
</head>

    <div class="top-user">
      <div>
        <div class="top-name" id="topName">員工</div>
        <div class="top-company" id="topCompany">—</div>
      </div>
      <div class="top-avatar" id="topAvatar">E</div>
      <button class="logout-btn" onclick="handleLogout()">登出</button>
    </div>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="showTab('home')" id="tab-home">🏠 我的工作台</div>
    <div class="nav-tab" onclick="showTab('schedule')" id="tab-schedule">📅 我的班表</div>
    <div class="nav-tab" onclick="showTab('leave')" id="tab-leave">🗓 申請假別</div>
    <div class="nav-tab" onclick="showTab('payroll')" id="tab-payroll">💰 薪資查詢</div>
  </div>
  <div class="content" id="contentArea"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const URL_SB='https://lgxvfpgxpigmsgfugegl.supabase.co';
const KEY_SB='sb_publishable_tm1h43HAkhQxjuoc-M3rQw_1kWI3b5Y';
const{createClient}=supabase;
const db=createClient(URL_SB,KEY_SB);
let currentUser=null,currentEmp=null;

async function init(){
  const{data:{session}}=await db.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  currentUser=session.user;
  const{data:emp}=await db.from('employees').select('*,companies(name,short_name)').eq('user_id',currentUser.id).single();
  if(!emp){window.location.href='index.html';return;}
  if(emp.role==='admin'){window.location.href='dashboard.html';return;}
  currentEmp=emp;
  document.getElementById('topName').textContent=emp.name;
  document.getElementById('topCompany').textContent=emp.companies?.short_name||'';
  document.getElementById('topAvatar').textContent=emp.name[0];
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  showTab('home');
}

function showTab(tab){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  if(tab==='home')renderHome();
  else if(tab==='schedule')renderSchedule();
  else if(tab==='leave')renderLeave();
  else if(tab==='payroll')renderPayroll();
}

async function renderHome(){
  const el=document.getElementById('contentArea');
  const{data:leaves}=await db.from('leave_requests').select('*').eq('employee_id',currentEmp.id).order('created_at',{ascending:false}).limit(5);
  const pending=(leaves||[]).filter(l=>l.status==='pending').length;
  const approved=(leaves||[]).filter(l=>l.status==='approved').length;
  const now=new Date();
  const gr=now.getHours()<12?'早安':now.getHours()<18?'午安':'晚安';
  el.innerHTML=`
    <div class="welcome-card">
      <div class="welcome-greeting">${gr}，${currentEmp.name} 👋</div>
      <div class="welcome-sub">${currentEmp.companies?.name} · ${now.getFullYear()-1911}年${now.getMonth()+1}月${now.getDate()}日</div>
      <div class="welcome-stats">
        <div class="welcome-stat"><div class="welcome-stat-val">${pending}</div><div class="welcome-stat-label">待審假別</div></div>
        <div class="welcome-stat"><div class="welcome-stat-val">${approved}</div><div class="welcome-stat-label">已核准假別</div></div>
        <div class="welcome-stat"><div class="welcome-stat-val">${currentEmp.monthly_salary?'NT$'+Number(currentEmp.monthly_salary).toLocaleString():'—'}</div><div class="welcome-stat-label">月薪</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">近期假別紀錄</span>
        <button style="font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;color:var(--muted)" onclick="showTab('leave')">申請假別</button>
      </div>
      ${renderLeaveTable(leaves||[])}
    </div>`;
}

async function renderSchedule(){
  const el=document.getElementById('contentArea');
  el.innerHTML='<div class="empty"><div class="spinner" style="margin:auto"></div></div>';
  const today=new Date();const day=today.getDay()||7;
  const monday=new Date(today);monday.setDate(today.getDate()-day+1);
  const wk=Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;});
  const s0=wk[0].toISOString().split('T')[0],s6=wk[6].toISOString().split('T')[0];
  const{data:sc}=await db.from('schedules').select('*').eq('employee_id',currentEmp.id).gte('work_date',s0).lte('work_date',s6);
  const sm={};(sc||[]).forEach(s=>{sm[s.work_date]=s;});
  const dn=['一','二','三','四','五','六','日'];
  const sl={full:'全天',am:'早班',pm:'晚班',off:'休假',holiday:'國定'};
  const cls={full:'shift-full',am:'shift-am',pm:'shift-pm',off:'shift-off',holiday:'shift-holiday'};
  el.innerHTML=`
    <div class="card">
      <div class="card-header"><span class="card-title">本週班表</span>
        <span style="font-size:12px;color:var(--muted)">${wk[0].getMonth()+1}/${wk[0].getDate()} – ${wk[6].getMonth()+1}/${wk[6].getDate()}</span></div>
      <div class="week-grid">
        ${wk.map((d,i)=>{
          const ds=d.toISOString().split('T')[0];const s=sm[ds];
          const isToday=ds===today.toISOString().split('T')[0];const isWeekend=i>=5;
          return`<div class="day-cell ${isToday?'today':''} ${isWeekend?'weekend':''}">
            <div class="day-name">週${dn[i]}</div>
            <div class="day-date">${d.getMonth()+1}/${d.getDate()}</div>
            ${s?`<div class="day-shift ${cls[s.shift_type]||'shift-off'}">${sl[s.shift_type]||s.shift_type}</div>`:`<div class="shift-none">—</div>`}
          </div>`;}).join('')}
      </div>
    </div>`;
}

async function renderLeave(){
  const el=document.getElementById('contentArea');
  const{data:myLeaves}=await db.from('leave_requests').select('*').eq('employee_id',currentEmp.id).order('created_at',{ascending:false});
  const today=new Date().toISOString().split('T')[0];
  el.innerHTML=`
    <div class="card">
      <div class="card-header"><span class="card-title">申請假別</span></div>
      <div class="leave-form">
        <div class="form-grid">
          <div class="form-row"><label>假別類型</label>
            <select id="leaveType"><option value="特休">特休</option><option value="病假">病假</option><option value="事假">事假</option><option value="補休">補休</option><option value="補班">補班</option></select></div>
          <div class="form-row"><label>天數</label><input type="number" id="leaveDays" min="0.5" max="30" step="0.5" value="1"></div>
        </div>
        <div class="form-grid">
          <div class="form-row"><label>開始日期</label><input type="date" id="leaveStart" value="${today}"></div>
          <div class="form-row"><label>結束日期</label><input type="date" id="leaveEnd" value="${today}"></div>
        </div>
        <div class="form-row"><label>申請原因</label><textarea id="leaveReason" rows="2" placeholder="選填"></textarea></div>
        <button class="btn btn-primary" id="leaveBtn" onclick="submitLeave()">送出申請</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">我的假別記錄</span></div>
      ${renderLeaveTable(myLeaves||[])}
    </div>`;
}

async function submitLeave(){
  const type=document.getElementById('leaveType').value;
  const start=document.getElementById('leaveStart').value;
  const end=document.getElementById('leaveEnd').value;
  const days=parseFloat(document.getElementById('leaveDays').value);
  const reason=document.getElementById('leaveReason').value;
  const btn=document.getElementById('leaveBtn');
  if(!start||!end||!days){showToast('請填寫完整資訊','error');return;}
  if(start>end){showToast('結束日期不能早於開始日期','error');return;}
  btn.disabled=true;btn.textContent='送出中...';
  const{error}=await db.from('leave_requests').insert({employee_id:currentEmp.id,company_id:currentEmp.company_id,leave_type:type,start_date:start,end_date:end,days,reason:reason||null,status:'pending'});
  btn.disabled=false;btn.textContent='送出申請';
  if(error){showToast('送出失敗：'+error.message,'error');return;}
  showToast('假別申請已送出，等待審核');renderLeave();
}

async function renderPayroll(){
  const el=document.getElementById('contentArea');
  const{data:records}=await db.from('payroll_records').select('*').eq('employee_id',currentEmp.id).order('year',{ascending:false}).order('month',{ascending:false});
  el.innerHTML=`
    <div class="card">
      <div class="card-header"><span class="card-title">薪資資訊</span></div>
      <div style="padding:18px">
        <div class="pay-line"><span>基本月薪</span><span>${currentEmp.monthly_salary?'NT$ '+Number(currentEmp.monthly_salary).toLocaleString():'請聯絡管理者設定'}</span></div>
        <div class="pay-line"><span>到職日</span><span>${currentEmp.hire_date||'—'}</span></div>
        <div class="pay-line"><span>公司</span><span>${currentEmp.companies?.name}</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">薪資單記錄</span></div>
      ${!records||records.length===0?'<div class="empty"><div class="empty-icon">💰</div>尚無薪資單記錄</div>':
      `<table class="leave-table"><thead><tr><th>年月</th><th>實際時數</th><th>加班時數</th><th>應發薪資</th><th>狀態</th></tr></thead><tbody>
        ${records.map(r=>`<tr>
          <td>${r.year}年${r.month}月</td><td>${r.actual_hours||'—'} h</td><td>${r.overtime_hours||0} h</td>
          <td>${r.net_pay?'NT$ '+Number(r.net_pay).toLocaleString():'—'}</td>
          <td><span class="status-pill ${r.status==='paid'?'s-approved':'s-pending'}">${r.status==='paid'?'已發放':'待確認'}</span></td>
        </tr>`).join('')}
      </tbody></table>`}
    </div>`;
}

function renderLeaveTable(leaves){
  if(!leaves||leaves.length===0)return'<div class="empty"><div class="empty-icon">📋</div>尚無記錄</div>';
  const sm={pending:['s-pending','dot-pending','待審核'],approved:['s-approved','dot-approved','已核准'],rejected:['s-rejected','dot-pending','已拒絕']};
  return`<table class="leave-table"><thead><tr><th>假別</th><th>日期</th><th>天數</th><th>原因</th><th>狀態</th></tr></thead><tbody>
    ${leaves.map(l=>{const[cls,dc,label]=sm[l.status]||sm.pending;
      return`<tr><td><strong>${l.leave_type}</strong></td>
        <td>${l.start_date}${l.start_date!==l.end_date?' ~ '+l.end_date:''}</td>
        <td>${l.days}天</td><td style="color:var(--muted)">${l.reason||'—'}</td>
        <td><span class="status-pill ${cls}"><span class="dot ${dc}"></span>${label}</span></td>
      </tr>`;}).join('')}
  </tbody></table>`;
}

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast toast-${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}
async function handleLogout(){await db.auth.signOut();window.location.href='index.html';}
init();
</script>
</body>
</html>
